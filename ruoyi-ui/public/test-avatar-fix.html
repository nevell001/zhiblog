<!DOCTYPE html>
<html>
<head>
    <title>头像修复测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .avatar-test { border: 2px solid #ccc; margin: 10px; display: inline-block; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>头像修复测试</h1>

    <div class="test-section">
        <h3>测试1: 默认头像SVG</h3>
        <img id="defaultAvatar" class="avatar-test" width="80" height="80">
        <p>应该显示蓝色圆形默认头像</p>
    </div>

    <div class="test-section">
        <h3>测试2: API返回的头像设置</h3>
        <div id="apiResult"></div>
    </div>

    <div class="test-section">
        <h3>测试3: 模拟头像获取逻辑</h3>
        <div id="logicResult"></div>
    </div>

    <script>
        // 默认头像
        const defaultAvatar = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjgwIiBoZWlnaHQ9IjgwIiByeD0iNDAiIGZpbGw9IiM0MDlFRkYiLz4KPGNpcmNsZSBjeD0iNDAiIGN5PSIzMCIgcj0iMTQiIGZpbGw9IndoaXRlIi8+CjxlbGxpcHNlIGN4PSI0MCIgY3k9IjU4IiByeD0iMjAiIHJ5PSIxNiIgZmlsbD0id2hpdGUiLz4KPHN2Zz4K';

        // 设置默认头像
        document.getElementById('defaultAvatar').src = defaultAvatar;

        // 测试API
        fetch('http://localhost:8080/blog/setting')
            .then(response => response.json())
            .then(data => {
                const avatar = data.data.blog_avatar;
                document.getElementById('apiResult').innerHTML =
                    `<p>API返回的头像: <strong>"${avatar}"</strong></p>
                     <p>类型: <strong>${typeof avatar}</strong></p>
                     <p>长度: <strong>${avatar ? avatar.length : 0}</strong></p>
                     <p>是否为空: <strong>${!avatar || avatar.trim() === ''}</strong></p>`;

                // 测试头像获取逻辑
                const result = getAvatarUrl(avatar);
                document.getElementById('logicResult').innerHTML =
                    `<p>逻辑测试结果: <strong>${result}</strong></p>
                     <img src="${result}" class="avatar-test" width="80" height="80">`;
            })
            .catch(error => {
                document.getElementById('apiResult').innerHTML = `<p style="color: red;">API调用失败: ${error.message}</p>`;
            });

        // 复制前端逻辑
        function getAvatarUrl(avatar) {
            console.log('获取到的头像设置:', avatar);

            // 如果有有效的头像URL（非空且不是旧的placeholder），直接返回
            if (avatar && avatar.trim() && !avatar.includes('via.placeholder.com')) {
                console.log('使用配置的头像:', avatar);
                return avatar;
            }

            // 否则返回默认头像（使用Data URL）
            console.log('使用默认头像');
            return defaultAvatar;
        }
    </script>
</body>
</html>
