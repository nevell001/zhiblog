# Docker Compose 生产环境配置
# 警告：必须配置 .env 文件并设置强密码
# 所有敏感信息必须通过环境变量配置，不能使用默认值

services:
  ruoyi-admin:
    build:
      context: .
      dockerfile: Dockerfile-admin
    container_name: ruoyi-admin
    working_dir: /app
    command:
      - sh
      - -c
      - |
        ln -snf /usr/share/zoneinfo/$TZ /etc/localtime
        echo $TZ > /etc/timezone
        for i in {1..60}; do
          curl -f mysql:3306 2>/dev/null && echo 'MySQL is ready' && break || echo 'waiting mysql...' && sleep 2
        done
        java -jar /app/ruoyi-admin.jar --spring.redis.host=redis --spring.redis.port=6379
    ports:
      - "8080:8080"
    volumes:
      - ./uploadPath:/app/uploadPath
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '0.5'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-newblog}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      R_TOKEN_SECRET: ${R_TOKEN_SECRET}
      DRUID_USERNAME: ${DRUID_USERNAME:-ruoyi}
      DRUID_PASSWORD: ${DRUID_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      # 验证码开关 - 从 .env 文件读取，生产环境建议启用
      CAPTCHA_ENABLED: ${CAPTCHA_ENABLED:-true}
    networks:
      - ruoyi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/manage/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-newblog}
    ports:
      - "127.0.0.1:3306:3306"  # 仅本地访问
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      timeout: 20s
      retries: 20
      interval: 10s
      start_period: 40s
    networks:
      - ruoyi-network

  redis:
    image: redis:6.2
    container_name: redis
    restart: always
    command: >
      sh -c '
        if [ -n "${REDIS_PASSWORD:-}" ]; then
          redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
        else
          redis-server --appendonly yes
        fi
      '
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: >
        sh -c '
          if [ -n "${REDIS_PASSWORD:-}" ]; then
            redis-cli -a "${REDIS_PASSWORD}" ping
          else
            redis-cli ping
          fi
        '
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - ruoyi-network

  ruoyi-ui:
    build:
      context: ./ruoyi-ui
      dockerfile: Dockerfile.prod
    image: ruoyi-ui:prod
    container_name: ruoyi-ui
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      ruoyi-admin:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DOCKER: "true"
      VUE_APP_BASE_API: http://localhost
      VUE_APP_ENV: production
      NGINX_HOST: ${NGINX_HOST:-localhost}
      NGINX_PORT: 80
    volumes:
      - ./ruoyi-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ruoyi-ui/ssl:/etc/nginx/ssl:ro  # SSL证书目录
    networks:
      - ruoyi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
  redis_data:

networks:
  ruoyi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
