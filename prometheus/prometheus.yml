global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'newblog-monitor'

scrape_configs:
  # 监控 Spring Boot Actuator
  - job_name: 'spring-boot-actuator'
    metrics_path: '/manage/actuator/prometheus'
    static_configs:
      - targets: ['ruoyi-admin:8080']
        labels:
          application: 'newblog'
          environment: 'dev'
    scrape_interval: 10s
    scrape_timeout: 10s
    # 添加认证信息
    authorization:
      credentials: 'admin'
    # 添加 bearer token（需要动态获取）
    # bearer_token_file: /etc/prometheus/token.txt

  # 监控 Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']