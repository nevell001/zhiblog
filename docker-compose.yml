services:
  ruoyi-admin:
    build:
      context: .
      dockerfile: Dockerfile-admin
    container_name: ruoyi-admin
    working_dir: /app
    command: sh -c "ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone && for i in {1..60}; do nc -z mysql 3306 && echo 'MySQL is ready' && break || echo 'waiting mysql...' && sleep 2; done && java -Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -jar /app/ruoyi-admin.jar --spring.redis.url=redis://@redis:6379 --spring.redis.host=redis --spring.redis.port=6379 --logging.level.org.springframework.data.redis=DEBUG --xss.excludes=/system/notice,/system/article,/system/user,/manage/**"
    ports:
      - "8080:8080"
    volumes:
      - ./uploadPath:/app/uploadPath
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - ruoyi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-newblog}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4 
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone='+08:00'
      --log_timestamps=SYSTEM
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 20s
      retries: 20
      interval: 10s
      start_period: 120s
    networks:
      - ruoyi-network

  redis:
    image: redis:6.2
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
      interval: 5s
    networks:
      - ruoyi-network

  ruoyi-ui:
    build:
      context: ./ruoyi-ui
      dockerfile: Dockerfile.dev
    container_name: ruoyi-ui
    working_dir: /app
    volumes:
      - ./ruoyi-ui:/app:cached
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ruoyi-admin:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DOCKER: "true"
      VITE_API_BASE_URL: http://ruoyi-admin:8080
    networks:
      - ruoyi-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  ruoyi-network:
    driver: bridge