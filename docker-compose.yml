services:
  ruoyi-admin:
    build:
      context: .
      dockerfile: Dockerfile-admin
    container_name: ruoyi-admin
    working_dir: /app
    command: sh -c "for i in {1..30}; do if (echo > /dev/tcp/mysql/3306) >/dev/null 2>&1; then break; else echo 'waiting mysql...'; sleep 2; fi; done && java -jar /app/ruoyi-admin.jar"
    ports:
      - "8080:8080"            # 后端端口
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/newblog?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    networks:
      - dev_network

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: newblog
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d   # 初始化SQL脚本
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - ruoyi-network

  redis:
    image: redis:6.2
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - dev_network

  ruoyi-ui:
    image: node:20
    container_name: ruoyi-ui
    working_dir: /app
    volumes:
      - ./ruoyi-ui:/app
      - /app/node_modules  #避免宿主机 node_modules 覆盖容器内的
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"                # 前端端口
    networks:
      - dev_network

networks:
  dev_network:
    driver: bridge

volumes:
  mysql_data:
