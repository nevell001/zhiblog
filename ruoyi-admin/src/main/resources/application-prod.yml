# 生产环境配置
# 生产环境专用配置，安全性更高

# Spring配置
spring:
  # 数据源配置
  datasource:
    druid:
      # 生产环境关闭Druid监控页面
      stat-view-servlet:
        enabled: false
      # 生产环境关闭WebStatFilter
      webStatFilter:
        enabled: false
  # 生产环境关闭热部署
  devtools:
    restart:
      enabled: false
  # 生产环境文件上传限制
  servlet:
    multipart:
      # 单个文件大小限制
      max-file-size: 5MB
      # 总上传文件大小限制
      max-request-size: 10MB

# SpringDoc OpenAPI 配置 - 生产环境关闭
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 日志配置 - 生产环境使用info级别
logging:
  level:
    com.ruoyi: info
    org.springframework: warn

# 生产环境安全配置
server:
  # HTTPS 配置（根据需要启用）
  # ssl:
  #   key-store: classpath:keystore.p12
  #   key-store-password: your-password
  #   key-store-type: PKCS12
  #   key-alias: tomcat
  # port: 8443

  # 服务器头信息配置
  server-header:

# 安全配置
ruoyi:
  # 关闭获取IP地址
  addressEnabled: false
  # 使用字符验证码
  captchaType: char

# Token配置
token:
  # 缩短Token有效期
  expireTime: 15

# XSS防护配置
xss:
  # 启用XSS过滤
  enabled: true
  # 排除链接
  excludes: /blog/**,/api/**,/index
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*,/admin/*