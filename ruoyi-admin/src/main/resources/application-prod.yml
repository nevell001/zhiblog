# 生产环境配置
# 生产环境专用配置，安全性更高

# Spring配置
spring:
  # 数据源配置
  datasource:
    druid:
      # 生产环境关闭Druid监控页面
      stat-view-servlet:
        enabled: false
      # 生产环境关闭WebStatFilter
      webStatFilter:
        enabled: false
  # 生产环境关闭热部署
  devtools:
    restart:
      enabled: false
  # 生产环境文件上传限制
  servlet:
    multipart:
      # 单个文件大小限制
      max-file-size: 5MB
      # 总上传文件大小限制
      max-request-size: 10MB

# SpringDoc OpenAPI 配置 - 生产环境关闭
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 日志配置 - 生产环境使用info级别
logging:
  level:
    com.ruoyi: info
    org.springframework: warn

# 生产环境安全配置
server:
  # HTTPS 配置（根据需要启用）
  # ssl:
  #   key-store: classpath:keystore.p12
  #   key-store-password: your-password
  #   key-store-type: PKCS12
  #   key-alias: tomcat
  # port: 8443

  # 服务器头信息配置
  server-header:

# 生产环境安全配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 1.2.8
  # 版权年份
  copyrightYear: 2026
  # 关闭获取IP地址
  addressEnabled: false
  # 使用字符验证码
  captchaType: char
  # 验证码开关（从环境变量读取，默认true）
  captchaEnabled: ${CAPTCHA_ENABLED:true}

# Token配置
token:
  # 缩短Token有效期
  expireTime: 15

# XSS防护配置
xss:
  # 启用XSS过滤
  enabled: true
  # 排除链接
  excludes: /blog/**,/api/**,/index
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*,/admin/*

# Spring Boot Actuator 生产环境安全配置
management:
  # 生产环境只暴露必要的端点，移除可能泄露敏感信息的端点
  endpoints:
    web:
      exposure:
        # 暴露健康检查、基本信息、监控指标和 Prometheus 监控端点
        # 根端点会自动返回所有已暴露端点的链接
        # 移除 env 和 configprops 以防止泄露敏感信息
        include: health,info,metrics,prometheus
      base-path: /manage/actuator
    # 启用根端点
    enabled-by-default: true
  # 端点配置
  endpoint:
    health:
      enabled: true
      # 生产环境禁用健康检查详细信息
      show-details: never
      show-components: never
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  # 健康检查配置
  health:
    redis:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true
  # 应用信息配置
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# 应用信息配置
info:
  app:
    name: ${ruoyi.name}
    version: ${ruoyi.version}
    copyright-year: ${ruoyi.copyrightYear}
  build:
    artifact: ruoyi-admin
    name: ruoyi-admin
    description: 博客管理系统
  # Prometheus 配置
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: prod