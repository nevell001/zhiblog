# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 1.2.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径
  profile: ./uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
  # 验证码开关
  captchaEnabled: false

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 100
    threads:
      # tomcat最大线程数，默认为200
      max: 200
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 10

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn
    com.ruoyi.system.mapper: debug  # 开启MyBatis SQL日志

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 主库数据源
      master:
        url: jdbc:mysql://${DB_HOST:localhost}:3306/newblog?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:root}
        driverClassName: com.mysql.cj.jdbc.Driver
        # 从库数据源
        slave:
          # 从数据源开关/默认关闭
          enabled: false
          url:
          username:
          password:
        # 初始连接数
        initial-size: 10
        # 最小连接池数量
        min-idle: 10
        # 最大连接池数量
        max-active: 20
        # 配置获取连接等待超时的时间
        max-wait: 10000
        # 配置连接超时时间
        connect-timeout: 30000
        # 配置网络超时时间
        socket-timeout: 60000
        # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
        time-between-eviction-runs-millis: 60000
        # 配置一个连接在池中最小生存的时间，单位是毫秒
        min-evictable-idle-time-millis: 300000
        # 配置一个连接在池中最大生存的时间，单位是毫秒
        max-evictable-idle-time-millis: 900000
        # 配置检测连接是否有效
        validationQuery: SELECT 1
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        webStatFilter:
          enabled: true
        statViewServlet:
          enabled: true
          # 设置白名单
          allow: 127.0.0.1
          url-pattern: /druid/*
          # 控制台管理用户名和密码（从环境变量读取）
          # 安全警告：生产环境必须设置 DRUID_USERNAME 和 DRUID_PASSWORD 环境变量！
          # 生成强密码方法：openssl rand -base64 32
          login-username: ${DRUID_USERNAME:ruoyi}
          login-password: ${DRUID_PASSWORD:}
        filter:
          stat:
            enabled: true
            # 慢SQL记录
            log-slow-sql: true
            slow-sql-millis: 1000
            merge-sql: true
          wall:
            config:
              multi-statement-allow: false
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # MVC 配置
  mvc:
    static-path-pattern: /static/**
  # Web 资源配置
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/
  # 欢迎页面配置
  main:
    banner-mode: off
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # Redis URL（优先级最高，覆盖 host 和 port 配置）
    url: redis://${REDIS_PASSWORD:}@${REDIS_HOST:redis}:${REDIS_PORT:6379}
    # 地址
    host: ${REDIS_HOST:redis}
    # 端口，默认为6379
    port: ${REDIS_PORT:6379}
    # 数据库索引
    database: 0
    # 密码
    # 警告：生产环境强烈建议设置Redis密码
    password: ${REDIS_PASSWORD:}
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 600s  # 默认缓存10分钟
      cache-null-values: false
      key-prefix: "blog:"
      use-key-prefix: true

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥（必须通过环境变量设置，至少64位）
  # 生产环境：必须设置R_TOKEN_SECRET环境变量
  # 开发环境：会使用临时密钥并记录警告
  # 生成方法：openssl rand -base64 64
  secret: ${R_TOKEN_SECRET:#{null}}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# SpringDoc OpenAPI 配置（替代 Springfox，支持 Spring Boot 3.x）
springdoc:
  # 是否开启 API 文档
  api-docs:
    enabled: true
    # API 文档路径
    path: /v3/api-docs
  # Swagger UI 配置
  swagger-ui:
    enabled: true
    # Swagger UI 路径
    path: /swagger-ui.html
    # 默认展开所有接口
    default-models-expand-depth: -1
    # 默认展开所有标签
    default-model-expand-depth: 1
    # 启用深度链接
    deep-linking: true
    # 显示请求持续时间
    display-request-duration: true
    # 启用持久化授权
    persist-authorization: true
  # 分组配置
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.ruoyi

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice,/system/article,/manage/**
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 图片压缩配置
image:
  compress:
    # 是否启用图片压缩
    enabled: true
    # 压缩阈值（超过此大小才压缩）
    threshold-size: 2MB
    # 默认最大宽度
    max-width: 2560
    # 默认最大高度
    max-height: 1440
    # 默认压缩质量 (0.0-1.0) - 提高到0.9保持更好质量
    default-quality: 0.9
    # 头像压缩尺寸
    avatar-size: 200
    # 缩略图压缩尺寸
    thumbnail-size: 400
    # 头像压缩质量
    avatar-quality: 0.9
    # 缩略图压缩质量 - 提高到0.85
    thumbnail-quality: 0.85
    # 文章封面图宽度 - 提高到1200以支持更清晰的封面
    article-cover-width: 1200
    # 文章封面图高度 - 提高到675
    article-cover-height: 675
    # 文章封面图压缩质量 - 提高到0.9
    article-cover-quality: 0.9
    # 移动端最大宽度
    mobile-max-width: 750
    # 移动端压缩质量 - 提高到0.85
    mobile-quality: 0.85

# 防盗链配置
referer:
  # 是否启用防盗链
  enabled: false
  # 允许的域名列表（逗号分隔）
  allowed-domains: localhost,127.0.0.1

# Spring Boot Actuator 监控配置
management:
  # 启用所有端点
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops,prometheus
      base-path: /manage/actuator
  # 健康检查配置
  health:
    redis:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true
  # 端点详情
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    metrics:
      enabled: true
      tags:
        application: ${spring.application.name}
    prometheus:
      enabled: true
  # Metrics 配置
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
