<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨 Blog — 登录</title>
<link rel="stylesheet" href="shared.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--n50)}
.auth-wrapper{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;width:100%;max-width:1100px;background:#fff;border-radius:0;overflow:hidden;box-shadow:var(--shadow-lg)}
.auth-visual{background:linear-gradient(135deg,var(--p600),var(--p800));display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:56px 48px;color:#fff;position:relative;overflow:hidden}
.auth-visual::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.05)}
.auth-visual::after{content:'';position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05)}
.auth-visual .brand-lg{font-size:38px;font-weight:700;margin-bottom:8px;letter-spacing:-1px;position:relative;z-index:1}
.auth-visual .brand-lg span{color:var(--p200)}
.auth-visual .tagline{font-size:16px;opacity:.8;margin-bottom:36px;position:relative;z-index:1}
.auth-visual .features{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}
.auth-visual .feat{display:flex;align-items:center;gap:12px;font-size:14px;opacity:.9}
.auth-visual .feat .check{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.auth-form{display:flex;flex-direction:column;justify-content:center;padding:56px 48px;max-width:420px;margin:0 auto;width:100%}
.auth-form h2{font-size:26px;font-weight:700;color:var(--n900);margin-bottom:6px;letter-spacing:-.3px}
.auth-form .sub{font-size:14px;color:var(--n500);margin-bottom:28px}
.auth-tabs{display:flex;border-bottom:1px solid var(--n200);margin-bottom:28px}
.auth-tabs .tab{flex:1;text-align:center;padding:10px 0;font-size:14px;color:var(--n500);cursor:pointer;border-bottom:2px solid transparent;font-weight:500;transition:all .15s}
.auth-tabs .tab:hover{color:var(--n700)}
.auth-tabs .tab.active{color:var(--p600);border-bottom-color:var(--p600)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--n700);margin-bottom:6px}
.form-group .input-wrap{position:relative}
.form-group input{width:100%;padding:11px 14px;border:1px solid var(--n300);border-radius:var(--r-md);font-size:14px;outline:none;transition:all .2s;background:#fff;color:var(--n800)}
.form-group input:focus{border-color:var(--p400);box-shadow:0 0 0 3px var(--p50)}
.form-group input.error{border-color:var(--danger)}
.form-group .err-msg{font-size:12px;color:var(--danger);margin-top:4px;display:none;align-items:center;gap:4px}
.form-group .err-msg.show{display:flex}
.form-group .suffix{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--n400);font-size:16px;cursor:pointer;user-select:none}
.form-group .suffix:hover{color:var(--n600)}
.form-options{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;font-size:13px}
.form-options .remember{display:flex;align-items:center;gap:6px;color:var(--n600);cursor:pointer}
.form-options .remember input{width:16px;height:16px;accent-color:var(--p600)}
.form-options .forgot{color:var(--p600);cursor:pointer;font-weight:500}
.form-options .forgot:hover{text-decoration:underline}
.auth-submit{width:100%;padding:12px;font-size:15px;font-weight:600;border-radius:var(--r-md);background:var(--p600);color:#fff;cursor:pointer;transition:all .2s}
.auth-submit:hover{background:var(--p700);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.auth-submit:active{transform:scale(.98)}
.auth-divider{display:flex;align-items:center;gap:12px;margin:28px 0;color:var(--n400);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--n200)}
.social-login{display:flex;justify-content:center;gap:12px}
.social-btn{width:46px;height:46px;border-radius:var(--r-md);border:1px solid var(--n300);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.social-btn:hover{border-color:var(--p400);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.social-btn svg{width:22px;height:22px}
.pwd-strength{display:flex;gap:4px;margin-top:6px}
.pwd-strength .bar{flex:1;height:3px;border-radius:2px;background:var(--n200);transition:background .2s}
.pwd-strength .bar.active.weak{background:var(--danger)}
.pwd-strength .bar.active.medium{background:var(--warning)}
.pwd-strength .bar.active.strong{background:var(--success)}
.pwd-strength .label{font-size:11px;color:var(--n400);margin-top:2px}
@media(max-width:768px){
  .auth-wrapper{grid-template-columns:1fr;max-width:100%;box-shadow:none}
  .auth-visual{display:none}
  .auth-form{padding:32px 24px}
}
</style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-visual">
    <div class="brand-lg">墨<span>Blog</span></div>
    <div class="tagline">记录思考，分享洞见</div>
    <div class="features">
      <div class="feat"><span class="check">✓</span> 沉浸式阅读体验，衬线排版</div>
      <div class="feat"><span class="check">✓</span> Markdown 写作，草稿自动保存</div>
      <div class="feat"><span class="check">✓</span> 标签与分类，内容组织有序</div>
      <div class="feat"><span class="check">✓</span> 评论互动，思想碰撞</div>
    </div>
  </div>

  <div class="auth-form">
    <h2 id="formTitle">欢迎回来</h2>
    <p class="sub" id="formSub">登录你的账号，继续创作之旅</p>

    <div class="auth-tabs">
      <div class="tab active" data-mode="login">登录</div>
      <div class="tab" data-mode="register">注册</div>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>邮箱</label>
        <div class="input-wrap">
          <input type="email" id="loginEmail" placeholder="name@example.com" value="wukong@moblog.app">
        </div>
        <div class="err-msg" id="loginEmailErr">⚠ 请输入有效的邮箱地址</div>
      </div>

      <div class="form-group">
        <label>密码</label>
        <div class="input-wrap">
          <input type="password" id="loginPwd" placeholder="至少 8 位" value="••••••••••">
          <span class="suffix" onclick="togglePwd('loginPwd',this)">👁</span>
        </div>
        <div class="err-msg" id="loginPwdErr">⚠ 密码长度至少 8 位</div>
      </div>

      <div class="form-options">
        <label class="remember"><input type="checkbox" checked> 记住我</label>
        <span class="forgot">忘记密码？</span>
      </div>

      <button class="auth-submit" onclick="submitLogin()">登 录</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>昵称</label>
        <div class="input-wrap">
          <input type="text" id="regName" placeholder="你的昵称">
        </div>
        <div class="err-msg" id="regNameErr">⚠ 请输入昵称（2-20 字符）</div>
      </div>

      <div class="form-group">
        <label>邮箱</label>
        <div class="input-wrap">
          <input type="email" id="regEmail" placeholder="name@example.com">
        </div>
        <div class="err-msg" id="regEmailErr">⚠ 请输入有效的邮箱地址</div>
      </div>

      <div class="form-group">
        <label>密码</label>
        <div class="input-wrap">
          <input type="password" id="regPwd" placeholder="至少 8 位，含字母和数字" oninput="checkPwdStrength()">
          <span class="suffix" onclick="togglePwd('regPwd',this)">👁</span>
        </div>
        <div class="pwd-strength" id="pwdStrength">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="label" id="pwdLabel"></div>
        <div class="err-msg" id="regPwdErr">⚠ 密码需至少 8 位，包含字母和数字</div>
      </div>

      <div class="form-group">
        <label>确认密码</label>
        <div class="input-wrap">
          <input type="password" id="regPwd2" placeholder="再次输入密码">
        </div>
        <div class="err-msg" id="regPwd2Err">⚠ 两次输入的密码不一致</div>
      </div>

      <div class="form-options">
        <label class="remember"><input type="checkbox" id="agreeTerms"> 我已阅读并同意 <span class="forgot">用户协议</span> 和 <span class="forgot">隐私政策</span></label>
      </div>

      <button class="auth-submit" onclick="submitRegister()">注 册</button>
    </div>

    <div class="auth-divider">或使用第三方账号</div>

    <div class="social-login">
      <div class="social-btn" title="GitHub" onclick="socialLogin('GitHub')">
        <svg viewBox="0 0 24 24" fill="#181717"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 015.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.69 5.41-5.25 5.69.41.36.78 1.06.78 2.14 0 1.55-.01 2.8-.01 3.18 0 .31.21.67.8.56C20.21 21.38 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
      </div>
      <div class="social-btn" title="微信" onclick="socialLogin('微信')">
        <svg viewBox="0 0 24 24" fill="#07C160"><path d="M8.69 4C4.62 4 1.33 6.72 1.33 10.08c0 1.86 1.1 3.53 2.78 4.64l-.56 1.67c-.07.2.02.42.22.5.07.03.16.04.24.03l2.3-.7c.37.08.74.13 1.12.16-.05-.3-.08-.6-.08-.92 0-3.04 2.92-5.5 6.53-5.5.27 0 .54.02.8.05C14.82 6.23 12.05 4 8.69 4zm-2.5 3.3c.44 0 .8.36.8.8 0 .44-.36.8-.8.8-.44 0-.8-.36-.8-.8 0-.44.36-.8.8-.8zm5 0c.44 0 .8.36.8.8 0 .44-.36.8-.8.8-.44 0-.8-.36-.8-.8 0-.44.36-.8.8-.8zM13.48 10.5c-3.1 0-5.62 2.08-5.62 4.65 0 2.57 2.52 4.65 5.62 4.65.33 0 .66-.03.98-.08l1.78.54c.15.05.32-.03.37-.18.02-.06.02-.13 0-.19l-.4-1.2c1.4-.85 2.3-2.18 2.3-3.68 0-2.57-2.52-4.65-5.62-4.65zm-1.8 3.3c.33 0 .6.27.6.6 0 .33-.27.6-.6.6-.33 0-.6-.27-.6-.6 0-.33.27-.6.6-.6zm3.6 0c.33 0 .6.27.6.6 0 .33-.27.6-.6.6-.33 0-.6-.27-.6-.6 0-.33.27-.6.6-.6z"/></svg>
      </div>
      <div class="social-btn" title="Google" onclick="socialLogin('Google')">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      </div>
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.auth-tabs .tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tabs .tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const mode = tab.dataset.mode;
    if (mode === 'login') {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('formTitle').textContent = '欢迎回来';
      document.getElementById('formSub').textContent = '登录你的账号，继续创作之旅';
    } else {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('formTitle').textContent = '创建账号';
      document.getElementById('formSub').textContent = '填写信息，即刻开始创作';
    }
  });
});

function togglePwd(id, el) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; el.textContent = '🙈'; }
  else { input.type = 'password'; el.textContent = '👁'; }
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function showErr(id, show) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('show', show);
  const input = el.parentElement.querySelector('input');
  if (input) input.classList.toggle('error', show);
}

function submitLogin() {
  const email = document.getElementById('loginEmail').value;
  const pwd = document.getElementById('loginPwd').value;
  let valid = true;
  if (!validateEmail(email)) { showErr('loginEmailErr', true); valid = false; } else showErr('loginEmailErr', false);
  if (pwd.length < 8) { showErr('loginPwdErr', true); valid = false; } else showErr('loginPwdErr', false);
  if (valid) {
    alert('登录成功！正在跳转...');
    setTimeout(() => window.location.href = 'home.html', 500);
  }
}

function submitRegister() {
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const pwd = document.getElementById('regPwd').value;
  const pwd2 = document.getElementById('regPwd2').value;
  const agree = document.getElementById('agreeTerms').checked;
  let valid = true;
  if (name.length < 2 || name.length > 20) { showErr('regNameErr', true); valid = false; } else showErr('regNameErr', false);
  if (!validateEmail(email)) { showErr('regEmailErr', true); valid = false; } else showErr('regEmailErr', false);
  if (pwd.length < 8 || !/[a-zA-Z]/.test(pwd) || !/\d/.test(pwd)) { showErr('regPwdErr', true); valid = false; } else showErr('regPwdErr', false);
  if (pwd !== pwd2) { showErr('regPwd2Err', true); valid = false; } else showErr('regPwd2Err', false);
  if (!agree) { alert('请阅读并同意用户协议'); valid = false; }
  if (valid) {
    alert('注册成功！欢迎加入墨 Blog');
    setTimeout(() => window.location.href = 'home.html', 500);
  }
}

function checkPwdStrength() {
  const pwd = document.getElementById('regPwd').value;
  const bars = document.querySelectorAll('#pwdStrength .bar');
  const label = document.getElementById('pwdLabel');
  let score = 0;
  if (pwd.length >= 8) score++;
  if (pwd.length >= 12) score++;
  if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
  if (/\d/.test(pwd) && /[^a-zA-Z0-9]/.test(pwd)) score++;
  bars.forEach((bar, i) => {
    bar.className = 'bar';
    if (i < score) {
      if (score <= 1) bar.classList.add('active', 'weak');
      else if (score <= 2) bar.classList.add('active', 'medium');
      else bar.classList.add('active', 'strong');
    }
  });
  if (pwd.length === 0) label.textContent = '';
  else if (score <= 1) label.textContent = '弱';
  else if (score <= 2) label.textContent = '中';
  else label.textContent = '强';
}

function socialLogin(provider) {
  alert(`正在跳转到 ${provider} 授权登录...`);
}

document.getElementById('loginEmail').addEventListener('blur', function() {
  if (this.value && !validateEmail(this.value)) showErr('loginEmailErr', true);
  else showErr('loginEmailErr', false);
});
document.getElementById('regEmail').addEventListener('blur', function() {
  if (this.value && !validateEmail(this.value)) showErr('regEmailErr', true);
  else showErr('regEmailErr', false);
});
</script>
</body>
</html>
