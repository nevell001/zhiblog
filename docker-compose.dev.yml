# Docker Compose 开发环境配置
# 警告：在使用前，请复制 .env.example 为 .env 并设置所有必需的环境变量
# 特别注意修改所有默认密码

services:
  ruoyi-admin:
    build:
      context: .
      dockerfile: Dockerfile-admin
    container_name: ruoyi-admin
    working_dir: /app
    command:
      - sh
      - -c
      - |
        ln -snf /usr/share/zoneinfo/$TZ /etc/localtime
        echo $TZ > /etc/timezone
        for i in {1..60}; do
          curl -f mysql:3306 2>/dev/null && echo 'MySQL is ready' && break || echo 'waiting mysql...' && sleep 2
        done
        java -Xms512m -Xmx1024m -jar /app/ruoyi-admin.jar \
          --spring.datasource.druid.master.url=jdbc:mysql://mysql:3306/newblog?useSSL=false\&serverTimezone=Asia/Shanghai\&allowPublicKeyRetrieval=true\&characterEncoding=utf8\&useUnicode=true \
          --spring.datasource.druid.master.username=$DB_USERNAME \
          --spring.datasource.druid.master.password=$DB_PASSWORD \
          --spring.redis.host=redis \
          --spring.redis.port=6379 \
          --spring.redis.password=$REDIS_PASSWORD
    ports:
      - "8080:8080"
    volumes:
      - ./uploadPath:/app/uploadPath
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      R_TOKEN_SECRET: ${R_TOKEN_SECRET}
      DRUID_USERNAME: ${DRUID_USERNAME:-ruoyi}
      DRUID_PASSWORD: ${DRUID_PASSWORD}
      # 验证码开关 - 从 .env 文件读取
      CAPTCHA_ENABLED: ${CAPTCHA_ENABLED:-false}
    networks:
      - ruoyi-network

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-newblog}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      timeout: 20s
      retries: 20
      interval: 10s
      start_period: 40s
    networks:
      - ruoyi-network

  redis:
    image: redis:6.2
    container_name: redis
    restart: always
    command: >
      sh -c '
        if [ -n "${REDIS_PASSWORD:-}" ]; then
          redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
        else
          redis-server --appendonly yes
        fi
      '
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ruoyi-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - ruoyi-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PROVISIONING_ENABLED: "true"
    depends_on:
      - prometheus
    networks:
      - ruoyi-network

  ruoyi-ui:
    build:
      context: ./ruoyi-ui
      dockerfile: Dockerfile.dev
    image: ruoyi-ui:dev
    container_name: ruoyi-ui
    working_dir: /app
    volumes:
      - ./ruoyi-ui:/app:cached
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      ruoyi-admin:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DOCKER: "true"
      VITE_API_BASE_URL: http://ruoyi-admin:8080
      VITE_GRAFANA_URL: http://localhost:3001
    networks:
      - ruoyi-network

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ruoyi-network:
    driver: bridge
