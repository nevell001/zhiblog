<!DOCTYPE html>
<html>
<head>
    <title>标签颜色测试</title>
    <style>
        .tag-color-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 8px;
            vertical-align: middle;
            flex-shrink: 0;
            color: white;
        }
        .tag-color-badge i {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>标签颜色测试</h1>
    
    <h2>测试不同颜色值</h2>
    <div style="display: flex; align-items: center; margin-bottom: 10px;">
        <span class="tag-color-badge" style="background-color: #ff4500; color: white;">
            <i class="el-icon-star"></i>
        </span>
        Java (颜色: #ff4500)
    </div>
    
    <div style="display: flex; align-items: center; margin-bottom: 10px;">
        <span class="tag-color-badge" style="background-color: #67C23A; color: white;">
            <i class="el-icon-s-promotion"></i>
        </span>
        Spring Boot (颜色: #67C23A)
    </div>
    
    <div style="display: flex; align-items: center; margin-bottom: 10px;">
        <span class="tag-color-badge" style="background-color: #409EFF; color: white;">
            <i class="el-icon-s-platform"></i>
        </span>
        Vue.js (颜色: #409EFF)
    </div>
    
    <h2>测试空颜色值</h2>
    <div style="display: flex; align-items: center; margin-bottom: 10px;">
        <span class="tag-color-badge" style="background-color: #409EFF; color: white;">
            <i class="el-icon-star"></i>
        </span>
        默认颜色 (空值使用默认 #409EFF)
    </div>
</body>
</html>
